name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject upload token into HTML
        env:
          UPLOAD_TOKEN: ${{ secrets.UPLOAD_TOKEN }}
        run: |
          python3 - <<'EOF'
          import os
          token = os.environ.get('UPLOAD_TOKEN', '')
          if not token:
              print('::warning::UPLOAD_TOKEN secret não configurado. O upload de imagens pelo site não funcionará até que o secret seja adicionado.')
              print('::warning::Para ativar: Settings → Secrets and variables → Actions → New secret → UPLOAD_TOKEN')
          else:
              # Escape any single quotes in the token to prevent breaking the JS string literal.
              safe_token = token.replace("'", "\\'")
              with open('index.html', 'r', encoding='utf-8') as f:
                  content = f.read()
              content = content.replace(
                  "const GH_TOKEN = '';",
                  "const GH_TOKEN = '" + safe_token + "';",
                  1
              )
              with open('index.html', 'w', encoding='utf-8') as f:
                  f.write(content)
              print('UPLOAD_TOKEN injetado com sucesso.')
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
